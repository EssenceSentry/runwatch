name: release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  release-build:
    name: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked release toolchain
        run: uv sync --locked --extra supervisor --extra test --extra dev --extra docs
      - name: Verify release tag and main ancestry
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          uv run python scripts/check_release.py --tag "${RELEASE_TAG}"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - name: Run complete quality gate
        run: uv run pre-commit run --all-files
      - name: Build release distributions
        run: uv build --out-dir dist
      - name: Validate release metadata
        run: uv run twine check --strict dist/*
      - name: Upload verified distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  pypi-publish:
    name: publish-to-pypi
    needs:
      - release-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/runwatch-notebook
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-distributions
          path: dist/
      - name: Publish distributions with attestations
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

# Runwatch configuration schema. Version 2 intentionally rejects 0.1 run state.
# String values expand $NAME or ${NAME}; unset variables are rejected. Use $$ for a
# literal dollar sign. Placeholders in comments are ignored.
schema_version: 2

notebook:
  # null selects the notebook kernelspec; otherwise use an installed kernel name.
  kernel_name: null
  # Per-cell execution timeout. null allows long-running cells.
  timeout_seconds: null
  startup_timeout_seconds: 60
  checkpoint_interval_seconds: 2.0
  # Cancellation escalates through interrupt, shutdown, terminate, and kill.
  # Each grace bounds how long Runwatch waits before advancing to the next stage.
  cancel_interrupt_grace_seconds: 5.0
  cancel_shutdown_grace_seconds: 5.0
  cancel_terminate_grace_seconds: 3.0
  cancel_kill_grace_seconds: 2.0
  # Automatically mirror tqdm progress from Python kernels into the dashboard.
  capture_tqdm: true
  # Runwatch adds this floor on top of tqdm's own display throttling.
  tqdm_min_interval_seconds: 0.5
  # Wait for resources explicitly registered as blocking after notebook execution.
  wait_for_blocking_resources: true
  # Recommended for unattended runs; null waits without a deadline.
  resource_completion_timeout_seconds: null

aws:
  # null uses the normal boto3 credential and region resolution chain.
  profile_name: null
  region_name: null
  poll_interval_seconds: 15.0
  stop_timeout_seconds: 300.0
  final_log_drain_seconds: 3.0
  # Bound terminal log catch-up even when CloudWatch pagination never stabilizes.
  final_log_drain_max_pages: 20
  max_log_lines_per_poll: 250
  max_log_streams: 8

server:
  host: 127.0.0.1
  port: 8765
  # none keeps the dashboard local; lan binds all interfaces; cloudflared creates a tunnel.
  share: none
  # Optional externally managed base URL. Pairing tokens are appended at runtime.
  public_url: null
  open_browser: true
  # Show the current public-link QR inside the authenticated local dashboard.
  show_qr: true
  cloudflared_binary: cloudflared
  # Keep the terminal result visible briefly before automatic close and cleanup.
  # Set 0 to close immediately, or null to keep the dashboard alive until Ctrl+C.
  linger_seconds: 90

notifications:
  # Generic endpoints receive {title, message, data} JSON.
  webhook_urls: []
  # Set both values to enable ntfy push notifications.
  ntfy_base_url: null
  ntfy_topic: null
  # Optional periodic status notification interval (minimum 60 seconds).
  periodic_seconds: null
  # Bound the terminal outbox drain before retaining disposable run state for retry.
  terminal_drain_timeout_seconds: 30.0
  # Failed destinations retry independently through the durable SQLite outbox.
  request_timeout_seconds: 15.0
  # Plain HTTP is allowed automatically only for loopback destinations.
  allow_insecure_http: false
  # Encoded webhook payload ceiling after presentation sanitization.
  max_payload_bytes: 16384
  max_delivery_attempts: 4
  # Unexpected routing failures are dead-lettered after this many attempts.
  max_routing_attempts: 4
  retry_initial_seconds: 1.0
  retry_max_seconds: 60.0

storage:
  max_observations_per_resource: 10000
  max_observation_bytes_per_resource: 8388608
  max_log_lines_per_resource: 2000
  max_log_bytes_per_resource: 2097152
  max_events_per_run: 10000
  max_event_bytes_per_run: 8388608
  # Reject any one event before it can bypass aggregate retention budgets.
  max_event_payload_bytes: 2097152
  # Applies independently to registrations, cursors, and observations.
  max_resource_payload_bytes: 4194304
  # Includes notification title, message, data, dedup key, and destinations.
  max_notification_record_bytes: 524288
  # UTF-8 byte ceiling for each persisted delivery diagnostic.
  max_delivery_error_bytes: 4096
  dashboard_chart_points: 300

# Static resources can be declared here. Dynamically created resources should use
# runwatch.aws or runwatch.local emitters from notebook cells. Blocking resources are
# accepted only when their adapter has a valid terminal condition.
resources: []
